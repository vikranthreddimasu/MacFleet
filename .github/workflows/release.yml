name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify-version:
    name: verify version matches tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version consistency
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          INIT_VERSION=$(python -c "import ast; print(ast.parse(open('macfleet/__init__.py').read()).body[[i for i,n in enumerate(ast.parse(open('macfleet/__init__.py').read()).body) if isinstance(n, ast.Assign) and n.targets[0].id=='__version__'][0]].value.value)")
          echo "Tag: v$TAG_VERSION"
          echo "pyproject.toml: $PYPROJECT_VERSION"
          echo "__init__.py: $INIT_VERSION"
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) does not match pyproject.toml ($PYPROJECT_VERSION)"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$INIT_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) does not match macfleet/__init__.py ($INIT_VERSION)"
            exit 1
          fi

  test:
    name: run full test suite before releasing
    runs-on: macos-14
    needs: [verify-version]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with all extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"
      - name: Run tests
        run: python -m pytest tests/ -v

  build:
    name: build sdist and wheel
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      dist-name: ${{ steps.artifact.outputs.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --upgrade pip build
      - name: Build distributions
        run: python -m build
      - name: Upload artifacts
        id: artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-pypi:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: pypi
      url: https://pypi.org/p/macfleet
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
