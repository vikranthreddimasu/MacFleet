name: test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: ruff
        run: ruff check macfleet/ tests/
      - name: mypy (informational)
        continue-on-error: true
        run: mypy macfleet/ --ignore-missing-imports

  framework-agnostic:
    name: framework-agnostic (ubuntu, py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install core (no torch, no mlx)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run framework-agnostic tests
        run: |
          python -m pytest tests/ -v \
            --ignore=tests/test_engines/test_torch_engine.py \
            --ignore=tests/test_engines/test_mlx_engine.py \
            --ignore=tests/test_integration \
            --ignore=tests/test_training \
            --ignore=tests/test_sdk \
            --ignore=tests/test_compute \
            --ignore=tests/test_compression/test_compression.py

  torch-mps:
    name: torch-mps (macos-arm64, py${{ matrix.python }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install with torch
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,torch]"
      - name: Run torch + framework-agnostic tests
        run: python -m pytest tests/ -v --ignore=tests/test_engines/test_mlx_engine.py

  mlx:
    name: mlx (macos-arm64, py${{ matrix.python }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
        include:
          - python: "3.13"
            continue-on-error: true
    continue-on-error: ${{ matrix.continue-on-error || false }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install with mlx
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mlx]" || echo "MLX install failed on py${{ matrix.python }} (expected on 3.13)"
      - name: Run MLX tests
        run: python -m pytest tests/test_engines/test_mlx_engine.py -v

  integration:
    name: integration (macos-arm64, py3.12)
    runs-on: macos-14
    needs: [framework-agnostic]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install everything
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"
      - name: Run integration tests
        run: python -m pytest tests/test_integration tests/test_training tests/test_sdk tests/test_compute -v
